const TABS = [
  { key:"建築結構", label:"結構", icon:"⬡", accent:"#1e40af", light:"#dbeafe", mid:"#93c5fd" },
  { key:"法規",     label:"法規", icon:"⚖", accent:"#6d28d9", light:"#ede9fe", mid:"#c4b5fd" },
  { key:"建築構造", label:"構造", icon:"◧", accent:"#065f46", light:"#d1fae5", mid:"#6ee7b7" },
];
const DIFF = {
  易:{ text:"#14532d", bg:"#dcfce7", border:"#86efac" },
  中:{ text:"#78350f", bg:"#fef3c7", border:"#fcd34d" },
  難:{ text:"#7f1d1d", bg:"#fee2e2", border:"#fca5a5" },
};
const L = "ABCD";
const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

async function callAI(q, subj) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{ role:"user", content:
          `你是台灣建築師高考「${subj}」科目資深教授。以繁體中文約220字依序說明：①核心概念 ②解題邏輯（各選項錯誤原因）③規範依據（如有）④實務應用。\n\n題目：${q.q}\n正確答案：${L[q.ans]}. ${q.opts[q.ans]}` }]
      }),
    });
    const d = await res.json();
    return d.content?.[0]?.text ?? "（無法取得AI解析，請稍後再試）";
  } catch(e) {
    return "（AI解析暫時無法使用，請確認網路連線）";
  }
}

const SK = { 建築結構:"wq_struct", 法規:"wq_law", 建築構造:"wq_const" };
function loadWrong(subj) {
  try { return new Set(JSON.parse(localStorage.getItem(SK[subj]) || "[]")); } catch { return new Set(); }
}
function saveWrong(subj, set) {
  try { localStorage.setItem(SK[subj], JSON.stringify([...set])); } catch {}
}

function SubjectPanel({ tab }) {
  const questions = BANK[tab.key];
  const acc=tab.accent, lgt=tab.light, mid=tab.mid;

  const [page, setPage]       = useState("list");
  const [fDiff, setFDiff]     = useState("");
  const [fYear, setFYear]     = useState("");
  const [search, setSearch]   = useState("");
  const [selQ, setSelQ]       = useState(null);
  const [detBack, setDetBack] = useState("list");
  const [shown, setShown]     = useState(false);
  const [aiText, setAiText]   = useState("");
  const [aiLoad, setAiLoad]   = useState(false);
  const [examQs, setExamQs]   = useState([]);
  const [eIdx, setEIdx]       = useState(0);
  const [answers, setAnswers] = useState({});
  const [secs, setSecs]       = useState(0);
  const [live, setLive]       = useState(false);
  const [result, setResult]   = useState(null);
  const [wrong, setWrong]     = useState(() => loadWrong(tab.key));
  const timerRef              = useRef(null);

  useEffect(() => {
    if (live) { timerRef.current = setInterval(() => setSecs(s => s+1), 1000); }
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [live]);

  const toggleWrong = id => {
    const n = new Set(wrong);
    n.has(id) ? n.delete(id) : n.add(id);
    setWrong(n); saveWrong(tab.key, n);
  };

  const allYrs = [...new Set(questions.map(q => q.yr))].sort((a,b) => b-a);

  const filtered = questions.filter(q => {
    if (fDiff && q.diff !== fDiff) return false;
    if (fYear && q.yr !== parseInt(fYear)) return false;
    if (search.trim() && !q.q.includes(search) && !q.tags.some(t=>t.includes(search))) return false;
    return true;
  });

  function openDetail(q, back) {
    setSelQ(q); setDetBack(back ?? "list");
    setShown(false); setAiText(""); setAiLoad(false);
    setPage("detail");
  }

  async function doAI() {
    if (aiLoad) return;
    setAiLoad(true);
    const txt = await callAI(selQ, tab.key);
    setAiText(txt); setAiLoad(false);
  }

  function startExam(pool) {
    const qs = [...pool].sort(()=>Math.random()-.5).slice(0, Math.min(pool.length, 10));
    setExamQs(qs); setEIdx(0); setAnswers({}); setSecs(0); setLive(true); setResult(null);
    setPage("exam");
  }

  function submit() {
    setLive(false);
    const res = examQs.map(q => ({ ...q, ua:answers[q.id], ok:answers[q.id]===q.ans }));
    const n = new Set([...wrong, ...res.filter(r=>!r.ok).map(r=>r.id)]);
    setWrong(n); saveWrong(tab.key, n);
    setResult({ res, score:res.filter(r=>r.ok).length, total:res.length, time:secs });
    setPage("result");
  }

  const Pill = ({ children, color=acc, bg=lgt, border=mid, style:s }) => (
    <span style={{ display:"inline-flex",alignItems:"center",fontSize:11,padding:"2px 8px",
      borderRadius:4,fontFamily:"monospace",fontWeight:600,color,background:bg,
      border:`1px solid ${border}`,...s }}>{children}</span>
  );

  const DPill = ({ d }) => (
    <span style={{ display:"inline-flex",alignItems:"center",fontSize:11,padding:"2px 8px",
      borderRadius:4,fontFamily:"monospace",fontWeight:600,
      color:DIFF[d].text,background:DIFF[d].bg,border:`1px solid ${DIFF[d].border}` }}>{d}</span>
  );

  const TopBar = ({ title, onBack, right }) => (
    <div style={{ display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
      borderBottom:"1px solid #e5e7eb",background:"#fff",position:"sticky",top:0,zIndex:10 }}>
      {onBack && <button onClick={onBack} style={{ background:"none",border:"none",color:acc,
        fontSize:13,cursor:"pointer",fontFamily:"monospace",padding:0 }}>← 返回</button>}
      <span style={{ flex:1,fontWeight:700,fontSize:14 }}>{title}</span>
      {right}
    </div>
  );

  const Card = ({ q, back }) => {
    const isW = wrong.has(q.id);
    return (
      <div onClick={()=>openDetail(q,back)} style={{ background:"#fff",borderRadius:8,
        padding:"13px 14px",marginBottom:8,cursor:"pointer",transition:"all .15s",
        border:`1px solid ${isW?"#fca5a5":"#e5e7eb"}`,
        borderLeft:`3px solid ${isW?"#ef4444":acc}` }}>
        <div style={{ display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:8 }}>
          <Pill>{q.yr}</Pill>
          <DPill d={q.diff} />
          {q.isNew && <Pill color="#6d28d9" bg="#ede9fe" border="#c4b5fd">2025新</Pill>}
          {isW && <Pill color="#dc2626" bg="#fee2e2" border="#fca5a5" style={{marginLeft:"auto"}}>✗ 錯題</Pill>}
        </div>
        <p style={{ fontSize:13,lineHeight:1.65,color:"#374151",margin:0 }}>{q.q}</p>
        <div style={{ display:"flex",gap:5,marginTop:7,flexWrap:"wrap" }}>
          {q.tags.map(t=><span key={t} style={{ fontSize:11,color:"#9ca3af",fontFamily:"monospace" }}>#{t}</span>)}
        </div>
      </div>
    );
  };

  const OptBtn = ({ o, i, ua, revealed, onClick }) => {
    const isCor = revealed && i===selQ.ans;
    const isDim = revealed && i!==selQ.ans;
    const isSel = !revealed && ua===i;
    return (
      <div onClick={revealed?undefined:onClick} style={{ display:"flex",alignItems:"flex-start",
        gap:11,padding:"12px 14px",borderRadius:8,fontSize:13,lineHeight:1.55,marginBottom:8,
        cursor:revealed?"default":"pointer",transition:"all .15s",opacity:isDim?.4:1,
        color:isCor?"#166534":isSel?acc:"#374151",
        background:isCor?"#f0fdf4":isSel?lgt:"#f9fafb",
        border:`1px solid ${isCor?"#4ade80":isSel?mid:"#e5e7eb"}` }}>
        <span style={{ fontFamily:"monospace",fontWeight:700,minWidth:16,fontSize:13,
          color:isCor?"#166534":isSel?acc:"#9ca3af" }}>{L[i]}</span>
        <span style={{ flex:1 }}>{o}</span>
        {isCor && <span style={{ fontWeight:800 }}>✓</span>}
      </div>
    );
  };

  // LIST
  if (page === "list") return (
    <div style={{ background:"#f9fafb",minHeight:"100%",paddingBottom:80 }}>
      <TopBar title={`${tab.key}（${filtered.length} 題）`}
        right={<button onClick={()=>startExam(filtered)} style={{ padding:"6px 14px",
          background:acc,color:"#fff",border:"none",borderRadius:6,fontSize:12,
          fontWeight:700,cursor:"pointer" }}>模擬考 ▶</button>} />

      <div style={{ padding:"10px 14px",display:"flex",gap:7,flexWrap:"wrap",
        borderBottom:"1px solid #e5e7eb",background:"#fff" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="搜尋題目或 #標籤…"
          style={{ flex:"1 1 150px",padding:"7px 11px",background:"#f9fafb",
            border:"1px solid #d1d5db",borderRadius:7,fontSize:13,color:"#111",outline:"none" }} />
        <select value={fYear} onChange={e=>setFYear(e.target.value)}
          style={{ padding:"7px 9px",background:"#f9fafb",border:"1px solid #d1d5db",
            borderRadius:7,fontSize:12,color:"#374151",outline:"none" }}>
          <option value="">全部年份</option>
          {allYrs.map(y=><option key={y} value={y}>{y} 年</option>)}
        </select>
        <select value={fDiff} onChange={e=>setFDiff(e.target.value)}
          style={{ padding:"7px 9px",background:"#f9fafb",border:"1px solid #d1d5db",
            borderRadius:7,fontSize:12,color:"#374151",outline:"none" }}>
          <option value="">全部難度</option>
          {["易","中","難"].map(d=><option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      <div style={{ display:"flex",gap:6,padding:"10px 14px",background:lgt,
        borderBottom:`1px solid ${mid}` }}>
        {[["全部",questions.length],["2025新",questions.filter(q=>q.isNew).length],["錯題",wrong.size]].map(([lbl,n])=>(
          <div key={lbl} style={{ flex:1,textAlign:"center",background:"#fff",borderRadius:6,
            padding:"8px 4px",border:`1px solid ${mid}` }}>
            <div style={{ fontFamily:"monospace",fontSize:18,fontWeight:700,color:acc }}>{n}</div>
            <div style={{ fontSize:10,color:"#6b7280",marginTop:1 }}>{lbl}</div>
          </div>
        ))}
        {wrong.size > 0 && (
          <button onClick={()=>startExam(questions.filter(q=>wrong.has(q.id)))}
            style={{ flex:1,padding:"8px 4px",background:"#fee2e2",color:"#dc2626",
              border:"1px solid #fca5a5",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer" }}>
            ⚠ 錯題練習
          </button>
        )}
      </div>

      <div style={{ padding:"12px 14px" }}>
        {filtered.length===0
          ? <p style={{ textAlign:"center",padding:"60px",color:"#9ca3af",fontFamily:"monospace",fontSize:13 }}>查無符合題目</p>
          : filtered.map(q=><Card key={q.id} q={q} back="list" />)}
      </div>

      <div style={{ position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid #e5e7eb",padding:"10px 14px" }}>
        <button onClick={()=>startExam(filtered)} style={{ width:"100%",padding:"12px",
          background:acc,color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer" }}>
          從篩選結果出題（{Math.min(filtered.length,10)} 題）
        </button>
      </div>
    </div>
  );

  // DETAIL
  if (page==="detail" && selQ) {
    const q=selQ; const isW=wrong.has(q.id);
    return (
      <div style={{ background:"#f9fafb",minHeight:"100%",paddingBottom:40 }}>
        <TopBar title={tab.key} onBack={()=>setPage(detBack)}
          right={<button onClick={()=>toggleWrong(q.id)}
            style={{ fontSize:11,padding:"4px 9px",borderRadius:4,background:"none",
              border:`1px solid ${isW?"#fca5a5":"#d1d5db"}`,
              color:isW?"#dc2626":"#6b7280",fontFamily:"monospace",cursor:"pointer" }}>
            {isW?"移出錯題":"標記錯題"}</button>} />
        <div style={{ padding:"16px 14px 40px" }}>
          <div style={{ display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:14 }}>
            <Pill>{q.yr}</Pill><DPill d={q.diff} />
            {q.isNew && <Pill color="#6d28d9" bg="#ede9fe" border="#c4b5fd">2025新題</Pill>}
            <span style={{ marginLeft:"auto",fontFamily:"monospace",fontSize:11,color:"#9ca3af" }}>解：{L[q.ans]}</span>
          </div>
          <p style={{ fontSize:15,lineHeight:1.8,fontWeight:700,marginBottom:18 }}>{q.q}</p>
          {q.opts.map((o,i)=><OptBtn key={i} o={o} i={i} ua={undefined} revealed={shown} onClick={()=>setShown(true)} />)}
          {!shown
            ? <button onClick={()=>setShown(true)} style={{ width:"100%",padding:"12px",background:acc,
                color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer" }}>顯示答案與解析</button>
            : <>
                <div style={{ background:lgt,border:`1px solid ${mid}`,borderRadius:8,padding:14,margin:"14px 0" }}>
                  <div style={{ fontFamily:"monospace",fontSize:11,color:acc,letterSpacing:".12em",marginBottom:8 }}>// 基礎解析</div>
                  <p style={{ fontSize:13,lineHeight:1.8,color:"#374151",margin:0 }}>{q.exp}</p>
                </div>
                <div style={{ display:"flex",gap:5,flexWrap:"wrap",marginBottom:14 }}>
                  {q.tags.map(t=><span key={t} style={{ fontSize:11,color:"#9ca3af",fontFamily:"monospace" }}>#{t}</span>)}
                </div>
                {!aiText && !aiLoad && (
                  <button onClick={doAI} style={{ width:"100%",padding:"10px",background:"#fff",color:acc,
                    border:`1px solid ${mid}`,borderRadius:8,fontSize:13,cursor:"pointer" }}>
                    🤖 AI 教授深度解析
                  </button>
                )}
                {aiLoad && <p style={{ textAlign:"center",padding:12,color:"#9ca3af",fontFamily:"monospace",fontSize:13 }}>⏳ AI 解析中…</p>}
                {aiText && (
                  <div style={{ background:"#fff",border:`1px solid ${mid}`,borderRadius:8,padding:14,marginTop:10 }}>
                    <div style={{ fontFamily:"monospace",fontSize:11,color:acc,letterSpacing:".12em",marginBottom:8 }}>// AI 教授深度解析</div>
                    <p style={{ fontSize:13,lineHeight:1.85,color:"#374151",whiteSpace:"pre-wrap",margin:0 }}>{aiText}</p>
                  </div>
                )}
              </>}
        </div>
      </div>
    );
  }

  // EXAM
  if (page==="exam") {
    const q=examQs[eIdx]; const ua=answers[q?.id];
    const answeredCount=Object.keys(answers).length;
    return (
      <div style={{ background:"#f9fafb",minHeight:"100%",paddingBottom:20 }}>
        <div style={{ display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
          borderBottom:"1px solid #e5e7eb",background:"#fff",position:"sticky",top:0,zIndex:10 }}>
          <button onClick={()=>{ setLive(false); if(window.confirm("確定放棄考試？")) setPage("list"); }}
            style={{ background:"none",border:"none",color:"#ef4444",fontSize:13,cursor:"pointer",fontFamily:"monospace" }}>✕ 放棄</button>
          <span style={{ flex:1,fontWeight:700,fontSize:14 }}>第 {eIdx+1} / {examQs.length} 題</span>
          <span style={{ fontFamily:"monospace",fontSize:13,fontWeight:700,color:acc }}>{fmt(secs)}</span>
        </div>
        <div style={{ height:3,background:"#e5e7eb" }}>
          <div style={{ height:"100%",width:`${eIdx/examQs.length*100}%`,background:acc,transition:"width .3s" }} />
        </div>
        <div style={{ padding:"16px 14px 80px" }}>
          <div style={{ display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:14 }}>
            <Pill>{q.yr}</Pill><DPill d={q.diff} />
            {q.isNew && <Pill color="#6d28d9" bg="#ede9fe" border="#c4b5fd">2025新</Pill>}
            <span style={{ marginLeft:"auto",fontFamily:"monospace",fontSize:11,color:"#9ca3af" }}>{answeredCount}/{examQs.length} 已答</span>
          </div>
          <p style={{ fontSize:15,lineHeight:1.8,fontWeight:700,marginBottom:18 }}>{q.q}</p>
          {q.opts.map((o,i)=>(
            <div key={i} onClick={()=>setAnswers(p=>({...p,[q.id]:i}))}
              style={{ display:"flex",alignItems:"flex-start",gap:11,padding:"12px 14px",borderRadius:8,
                fontSize:13,lineHeight:1.55,marginBottom:8,cursor:"pointer",transition:"all .15s",
                color:ua===i?acc:"#374151",background:ua===i?lgt:"#fff",
                border:`1px solid ${ua===i?mid:"#e5e7eb"}` }}>
              <span style={{ fontFamily:"monospace",fontWeight:700,minWidth:16,fontSize:13,color:ua===i?acc:"#9ca3af" }}>{L[i]}</span>
              <span>{o}</span>
            </div>
          ))}
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:20 }}>
            {examQs.map((eq,i)=>(
              <div key={eq.id} onClick={()=>setEIdx(i)}
                style={{ width:26,height:26,borderRadius:4,cursor:"pointer",display:"flex",
                  alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontSize:10,fontWeight:700,
                  background:i===eIdx?lgt:answers[eq.id]!==undefined?"#dcfce7":"#fff",
                  border:`1px solid ${i===eIdx?acc:answers[eq.id]!==undefined?"#4ade80":"#e5e7eb"}`,
                  color:i===eIdx?acc:answers[eq.id]!==undefined?"#16a34a":"#9ca3af" }}>{i+1}</div>
            ))}
          </div>
        </div>
        <div style={{ position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid #e5e7eb",
          padding:"10px 14px",display:"flex",gap:8 }}>
          {eIdx > 0
            ? <button onClick={()=>setEIdx(i=>i-1)} style={{ flex:1,padding:"11px",background:"#f3f4f6",
                color:"#374151",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,cursor:"pointer" }}>← 上一題</button>
            : <div style={{ flex:1 }} />}
          {eIdx < examQs.length-1
            ? <button onClick={()=>{ if(ua!==undefined) setEIdx(i=>i+1); }}
                style={{ flex:1,padding:"11px",background:ua!==undefined?acc:"#d1d5db",
                  color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,
                  cursor:ua!==undefined?"pointer":"default" }}>下一題 →</button>
            : <button onClick={submit} style={{ flex:1,padding:"11px",background:"#16a34a",color:"#fff",
                border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer" }}>交卷 ✓</button>}
        </div>
      </div>
    );
  }

  // RESULT
  if (page==="result" && result) {
    const { res, score, total, time } = result;
    const p = Math.round(score/total*100);
    const grade = p>=90?"優秀":p>=70?"通過":p>=50?"待加強":"需加強";
    const col = p>=70?"#16a34a":p>=50?"#d97706":"#dc2626";
    return (
      <div style={{ background:"#f9fafb",minHeight:"100%",paddingBottom:80 }}>
        <TopBar title="考試結果" onBack={()=>setPage("list")} />
        <div style={{ textAlign:"center",padding:"28px 16px 20px",background:"#fff",borderBottom:"1px solid #e5e7eb" }}>
          <div style={{ fontFamily:"monospace",fontSize:56,fontWeight:700,lineHeight:1,color:col }}>
            {p}<span style={{ fontSize:26,opacity:.4 }}>%</span>
          </div>
          <div style={{ fontFamily:"monospace",fontSize:13,letterSpacing:".15em",color:col,marginTop:6 }}>{grade}</div>
          <div style={{ fontFamily:"monospace",fontSize:12,color:"#9ca3af",marginTop:8 }}>答對 {score}/{total} 題 · 用時 {fmt(time)}</div>
        </div>
        <div style={{ padding:"12px 14px" }}>
          {res.map(r=>(
            <div key={r.id} style={{ background:"#fff",borderRadius:8,padding:"12px 14px",marginBottom:8,
              border:`1px solid ${r.ok?"#bbf7d0":"#fca5a5"}`,
              borderLeft:`3px solid ${r.ok?"#4ade80":"#f87171"}` }}>
              <div style={{ display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginBottom:6 }}>
                <Pill>{r.yr}</Pill><DPill d={r.diff} />
                <span style={{ marginLeft:"auto",fontFamily:"monospace",fontSize:12,fontWeight:700,
                  color:r.ok?"#16a34a":"#dc2626" }}>{r.ok?"✓ 正確":"✗ 錯誤"}</span>
              </div>
              <p style={{ fontSize:13,color:"#374151",lineHeight:1.6,margin:0 }}>{r.q}</p>
              {!r.ok && (
                <>
                  <div style={{ fontSize:12,fontFamily:"monospace",color:"#9ca3af",
                    borderTop:"1px solid #e5e7eb",paddingTop:7,marginTop:7 }}>
                    你：{r.ua!==undefined?`${L[r.ua]}. ${r.opts[r.ua]}`:"未作答"}<br />
                    正確：<span style={{ color:"#16a34a" }}>{L[r.ans]}. {r.opts[r.ans]}</span>
                  </div>
                  <button onClick={()=>openDetail(r,"result")}
                    style={{ marginTop:6,padding:"4px 10px",fontSize:11,background:"none",
                      border:"1px solid #d1d5db",borderRadius:4,color:"#6b7280",fontFamily:"monospace",cursor:"pointer" }}>
                    查看解析 →</button>
                </>
              )}
            </div>
          ))}
        </div>
        <div style={{ position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid #e5e7eb",
          padding:"10px 14px",display:"flex",gap:8 }}>
          <button onClick={()=>startExam(questions)} style={{ flex:1,padding:"12px",background:acc,color:"#fff",
            border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer" }}>再來一次</button>
          <button onClick={()=>setPage("list")} style={{ padding:"12px 16px",background:"#f3f4f6",color:"#374151",
            border:"1px solid #d1d5db",borderRadius:8,fontSize:13,cursor:"pointer" }}>回題庫</button>
        </div>
      </div>
    );
  }

  return null;
}

// ═══════════════════════════════════════════════════════════
// 結構筆記面板
// ═══════════════════════════════════════════════════════════
function NotesPanel() {
  const [activeNote, setActiveNote] = useState(null);
  const [searchQ, setSearchQ] = useState("");

  const tagColor = t => {
    if (!t) return null;
    if (t.includes("常考")) return { bg:"#FCEBEB", color:"#A32D2D", border:"#F09595" };
    if (t.includes("計算")) return { bg:"#EEEDFE", color:"#3C3489", border:"#AFA9EC" };
    return { bg:"#FAEEDA", color:"#633806", border:"#EF9F27" };
  };

  const Tag = ({ text }) => {
    if (!text) return null;
    const c = tagColor(text);
    return <span style={{ display:"inline-block", fontSize:10, padding:"1px 7px",
      borderRadius:3, fontWeight:600, background:c.bg, color:c.color,
      border:`1px solid ${c.border}`, marginLeft:8 }}>{text}</span>;
  };

  // 搜尋過濾
  const matchedNotes = NOTES_DATA.map(note => {
    if (!searchQ.trim()) return { ...note, matched:false };
    const q = searchQ.trim();
    const inTitle = note.title.includes(q);
    const inSections = note.sections.some(s =>
      s.title.includes(q) ||
      (s.items && s.items.some(i => i.includes(q))) ||
      (s.formula && s.formula.includes(q)) ||
      (s.table && s.table.rows.some(r => r.some(c => c.includes(q))))
    );
    return { ...note, matched: inTitle || inSections };
  });

  const displayNotes = searchQ.trim()
    ? matchedNotes.filter(n => n.matched)
    : NOTES_DATA;

  // 詳細筆記頁
  if (activeNote) {
    const note = NOTES_DATA.find(n => n.id === activeNote);
    return (
      <div style={{ background:"#f9fafb", minHeight:"100%", paddingBottom:60 }}>
        {/* TopBar */}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px",
          borderBottom:"1px solid #e5e7eb", background:"#fff",
          position:"sticky", top:0, zIndex:10 }}>
          <button onClick={()=>setActiveNote(null)}
            style={{ background:"none", border:"none", color:note.accent,
              fontSize:13, cursor:"pointer", fontFamily:"monospace", padding:0 }}>← 返回</button>
          <span style={{ flex:1, fontWeight:700, fontSize:14 }}>{note.icon} {note.title}</span>
        </div>

        <div style={{ padding:"16px 14px 40px" }}>
          {note.sections.map((sec, si) => (
            <div key={si} style={{ marginBottom:24 }}>
              {/* Section header */}
              <div style={{ display:"flex", alignItems:"center", marginBottom:10,
                paddingBottom:6, borderBottom:`2px solid ${note.accent}` }}>
                <span style={{ fontWeight:700, fontSize:14, color:note.accent }}>{sec.title}</span>
                <Tag text={sec.tag} />
              </div>

              {/* Formula */}
              {sec.formula && (
                <div style={{ background:note.light, borderLeft:`3px solid ${note.accent}`,
                  borderRadius:"0 6px 6px 0", padding:"8px 12px", marginBottom:10,
                  fontFamily:"monospace", fontSize:13, color:note.accent, fontWeight:600 }}>
                  {sec.formula}
                </div>
              )}

              {/* Table */}
              {sec.table && (
                <div style={{ overflowX:"auto", marginBottom:10 }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead>
                      <tr>
                        {sec.table.headers.map((h,hi) => (
                          <th key={hi} style={{ background:note.light, color:note.accent,
                            fontWeight:600, padding:"7px 10px", textAlign:"left",
                            borderBottom:`1px solid ${note.border}`, whiteSpace:"nowrap" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {sec.table.rows.map((row, ri) => (
                        <tr key={ri}>
                          {row.map((cell, ci) => (
                            <td key={ci} style={{ padding:"6px 10px", fontSize:12,
                              borderBottom:"0.5px solid #e5e7eb", color:"#374151",
                              background: ri%2===0 ? "#fff" : "#fafaf9", verticalAlign:"top" }}>
                              {cell}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Items */}
              {sec.items && (
                <ul style={{ listStyle:"none", padding:0, margin:0 }}>
                  {sec.items.map((item, ii) => {
                    const isWarn = item.startsWith("⚠");
                    return (
                      <li key={ii} style={{ fontSize:13, lineHeight:1.75, color:"#374151",
                        padding:"4px 0 4px 16px", position:"relative",
                        borderBottom:"0.5px solid #f0f0ef",
                        background: isWarn ? "#FAEEDA" : "transparent",
                        borderRadius: isWarn ? 4 : 0,
                        paddingLeft: isWarn ? 10 : 16,
                        marginBottom: isWarn ? 4 : 0 }}>
                        {!isWarn && <span style={{ position:"absolute", left:0, top:6,
                          color:"#9ca3af", fontSize:11 }}>—</span>}
                        {item}
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
          ))}

          {/* 快速出題按鈕 */}
          <div style={{ marginTop:16, padding:"12px 14px", background:note.light,
            borderRadius:8, border:`1px solid ${note.border}`, textAlign:"center" }}>
            <p style={{ fontSize:12, color:note.accent, marginBottom:8 }}>
              練習與此筆記相關的題目
            </p>
            <button onClick={()=>{ window.dispatchEvent(new CustomEvent("switchTab", { detail:"建築結構" })); }}
              style={{ padding:"8px 20px", background:note.accent, color:"#fff",
                border:"none", borderRadius:6, fontSize:13, cursor:"pointer", fontWeight:600 }}>
              前往建築結構題庫 →
            </button>
          </div>
        </div>
      </div>
    );
  }

  // 筆記列表頁
  return (
    <div style={{ background:"#f9fafb", minHeight:"100%", paddingBottom:40 }}>
      {/* 搜尋列 */}
      <div style={{ padding:"12px 14px", borderBottom:"1px solid #e5e7eb", background:"#fff",
        position:"sticky", top:0, zIndex:10 }}>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          placeholder="搜尋筆記內容…"
          style={{ width:"100%", padding:"9px 12px", background:"#f9fafb",
            border:"1px solid #d1d5db", borderRadius:8, fontSize:13,
            color:"#111", outline:"none" }} />
      </div>

      {/* 科目總覽統計 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8,
        padding:"12px 14px", borderBottom:"1px solid #e5e7eb" }}>
        {[
          { label:"章節數", val:NOTES_DATA.length, color:"#7F77DD" },
          { label:"考點數", val:NOTES_DATA.reduce((a,n)=>a+n.sections.length,0), color:"#1e40af" },
          { label:"題庫題數", val:Object.values(BANK).flat().length, color:"#065f46" },
        ].map(s => (
          <div key={s.label} style={{ background:"#fff", borderRadius:8, padding:"10px",
            textAlign:"center", border:"0.5px solid #e5e7eb" }}>
            <div style={{ fontFamily:"monospace", fontSize:22, fontWeight:700, color:s.color }}>{s.val}</div>
            <div style={{ fontSize:10, color:"#9ca3af", marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* 筆記卡片列表 */}
      <div style={{ padding:"12px 14px" }}>
        {displayNotes.length === 0 && (
          <p style={{ textAlign:"center", padding:"40px", color:"#9ca3af",
            fontFamily:"monospace", fontSize:13 }}>查無符合筆記</p>
        )}
        {displayNotes.map(note => (
          <div key={note.id} onClick={()=>setActiveNote(note.id)}
            style={{ background:"#fff", borderRadius:10, padding:"14px 16px", marginBottom:10,
              cursor:"pointer", transition:"all .15s", border:"0.5px solid #e5e7eb",
              borderLeft:`4px solid ${note.accent}` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <span style={{ fontSize:18, fontWeight:700, color:note.accent }}>{note.icon}</span>
              <span style={{ fontWeight:700, fontSize:14, color:"#1a1a18" }}>{note.title}</span>
              <span style={{ marginLeft:"auto", fontSize:11, color:"#9ca3af",
                fontFamily:"monospace" }}>{note.sections.length} 小節</span>
            </div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
              {note.sections.map((s,i) => (
                <span key={i} style={{ fontSize:11, padding:"2px 7px", borderRadius:3,
                  background:note.light, color:note.accent, border:`0.5px solid ${note.border}` }}>
                  {s.title}
                </span>
              ))}
            </div>
            <div style={{ marginTop:8, fontSize:11, color:note.accent,
              fontFamily:"monospace" }}>點擊展開筆記 →</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 主 App
// ═══════════════════════════════════════════════════════════
function App() {
  const [activeTab, setActiveTab] = useState(0);

  // 監聽跨元件切換
  useEffect(() => {
    const handler = (e) => {
      const idx = TABS.findIndex(t => t.key === e.detail);
      if (idx >= 0) setActiveTab(idx + 1); // +1 because notes is tab 0
    };
    window.addEventListener("switchTab", handler);
    return () => window.removeEventListener("switchTab", handler);
  }, []);

  const ALL_TABS = [
    { key:"__notes__", label:"筆記", icon:"📋", accent:"#7F77DD", light:"#EEEDFE", mid:"#AFA9EC" },
    ...TABS,
  ];
  const tab = ALL_TABS[activeTab];

  return (
    <div style={{ fontFamily:"'Noto Serif TC',Georgia,'微軟正黑體',serif",
      background:"#f9fafb",minHeight:"100vh",display:"flex",flexDirection:"column" }}>

      {/* Tab 列 */}
      <div style={{ display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb",
        position:"sticky",top:0,zIndex:30 }}>
        {ALL_TABS.map((t,i) => {
          const active = i===activeTab;
          return (
            <button key={t.key} onClick={()=>setActiveTab(i)}
              style={{ flex:1,padding:"12px 6px 10px",background:"none",border:"none",
                borderBottom:active?`3px solid ${t.accent}`:"3px solid transparent",
                marginBottom:-2,cursor:"pointer",transition:"all .15s",
                color:active?t.accent:"#6b7280",fontWeight:active?700:400,
                fontFamily:"'Noto Serif TC',Georgia,serif" }}>
              <div style={{ fontSize:18,marginBottom:2 }}>{t.icon}</div>
              <div style={{ fontSize:12 }}>{t.label}</div>
            </button>
          );
        })}
      </div>

      {/* 科目色帶 */}
      <div style={{ padding:"7px 16px",background:tab.light,borderBottom:`1px solid ${tab.mid}`,
        display:"flex",alignItems:"center",gap:8 }}>
        <span style={{ fontSize:16 }}>{tab.icon}</span>
        <span style={{ fontWeight:700,fontSize:13,color:tab.accent }}>{tab.key === "__notes__" ? "結構學筆記" : tab.key}</span>
        <span style={{ fontSize:11,color:"#6b7280",marginLeft:4 }}>
          {{ "__notes__":"概論 · 靜定 · 行為 · 系統 · 材料 · 基礎",
             建築結構:"力學 · 耐震 · RC · 鋼構 · 基礎",
             法規:"建築法 · 建築師法 · 無障礙 · 規範",
             建築構造:"材料 · 玻璃 · 施工 · 永續建築" }[tab.key]}
        </span>
      </div>

      {/* 內容 */}
      <div style={{ flex:1 }}>
        {tab.key === "__notes__"
          ? <NotesPanel />
          : <SubjectPanel key={tab.key} tab={tab} />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
